# .github/workflows/backend/lint.yml
name: Backend Linting

on:
  workflow_call:
  push:
    branches: [master, dev, "feature/**"]
    paths:
      - "backend/**"
  pull_request:
    branches: [master, dev]
    paths:
      - "backend/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black isort

      - name: Run black
        run: |
          cd backend
          black . --check

      - name: Run isort
        run: |
          cd backend
          isort . --check-only

      - name: Run flake8
        run: |
          cd backend
          flake8 .

      - name: Run pylint
        run: |
          cd backend
          pylint **/*.py
