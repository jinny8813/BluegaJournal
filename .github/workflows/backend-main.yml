# .github/workflows/backend-main.yml
name: Backend Main Workflow

on:
  push:
    branches: [master, dev, "feature/**"]
    paths:
      - "backend/**"
  pull_request:
    branches: [master, dev]
    paths:
      - "backend/**"

jobs:
  determine_workflow:
    runs-on: ubuntu-latest
    outputs:
      run_full_suite: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev' }}
    steps:
      - run: echo "Determining workflow..."

  lint:
    needs: determine_workflow
    uses: lint.yml

  unit_tests:
    needs: lint
    uses: unit-tests.yml

  integration_tests:
    needs: unit_tests
    if: needs.determine_workflow.outputs.run_full_suite == 'true'
    uses: integration-tests.yml

  security_scan:
    needs: integration_tests
    if: needs.determine_workflow.outputs.run_full_suite == 'true'
    uses: security-scan.yml
