name: Backend CI

on:
  push:
    branches: [master, dev, "feature/**"]
    paths:
      - "backend/**"
      - ".github/workflows/backend/**"
  pull_request:
    branches: [master, dev]
    paths:
      - "backend/**"

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Setup Docker Compose
        uses: ndeloof/install-compose-action@v0.0.1
        with:
          version: v2.23.3 # 指定 Docker Compose 版本

  lint:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v3

      - name: Run code quality checks
        run: |
          docker-compose build backend
          docker-compose run --rm backend sh -c '
            # 安裝所需套件
            echo "Installing dependencies..."
            pip install --upgrade pip
            pip install black isort flake8 pylint

            # 運行 black 檢查代碼格式
            echo "\n=== Running Black format check ==="
            if ! black --check --diff .; then
              echo "Black check failed. Please format your code using black."
              exit 1
            fi

            # 運行 isort 檢查導入順序
            echo "\n=== Running isort check ==="
            if ! isort --check-only --diff .; then
              echo "Isort check failed. Please sort your imports using isort."
              exit 1
            fi

            # 運行 flake8 檢查代碼風格
            echo "\n=== Running Flake8 ==="
            if ! flake8 .; then
              echo "Flake8 check failed. Please fix the style issues."
              exit 1
            fi

            # 運行 pylint 檢查代碼質量
            echo "\n=== Running Pylint ==="
            find . -type f -name "*.py" ! -path "*/migrations/*" ! -path "*/tests/*" -exec pylint {} + || true
            
            # 獲取 pylint 分數並檢查是否達標
            echo "\n=== Checking Pylint Score ==="
            PYLINT_OUTPUT=$(find . -type f -name "*.py" ! -path "*/migrations/*" ! -path "*/tests/*" -exec pylint {} +)
            echo "$PYLINT_OUTPUT"
            
            PYLINT_SCORE=$(echo "$PYLINT_OUTPUT" | sed -n "s/^.*rated at \([0-9.]*\).*$/\1/p")
            echo "Pylint Score: $PYLINT_SCORE"
            
            if [ -z "$PYLINT_SCORE" ]; then
              echo "Could not determine Pylint score"
              exit 1
            fi
            
            if (( $(echo "$PYLINT_SCORE >= 8.5" | bc -l) )); then
              echo "Pylint score is above 8.5 (Current: $PYLINT_SCORE)"
            else
              echo "Pylint score is below 8.5 (Current: $PYLINT_SCORE)"
              exit 1
            fi
          '

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Build and run tests
        run: |
          docker-compose build backend
          docker-compose run --rm backend sh -c '
            # 安裝測試依賴
            pip install --upgrade pip
            pip install coverage pytest pytest-django pytest-cov

            # 運行測試並生成覆蓋率報告
            echo "\n=== Running Tests with Coverage ==="
            coverage run manage.py test
            
            # 顯示覆蓋率報告
            echo "\n=== Coverage Report ==="
            coverage report
            
            # 生成 XML 格式的覆蓋率報告（可選，用於上傳到 Codecov 等服務）
            coverage xml
          '

  integration_tests:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Run integration tests
        run: |
          docker-compose build backend
          docker-compose run --rm backend sh -c '
            # 安裝測試依賴
            pip install --upgrade pip
            pip install pytest pytest-django pytest-cov

            # 運行整合測試
            echo "\n=== Running Integration Tests ==="
            pytest -v -m integration
          '

  security_scan:
    runs-on: ubuntu-latest
    needs: integration_tests
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v3

      - name: Run security checks
        run: |
          docker-compose build backend
          docker-compose run --rm backend sh -c '
            # 安裝安全掃描工具
            pip install --upgrade pip
            pip install safety bandit

            # 運行依賴項安全檢查
            echo "\n=== Running Safety Check ==="
            safety check

            # 運行代碼安全掃描
            echo "\n=== Running Bandit Security Scan ==="
            bandit -r . -ll

            # 運行 Django 安全檢查（可選）
            echo "\n=== Running Django Security Check ==="
            python manage.py check --deploy
          '
