# backend/pyproject.toml
[tool.black]
line-length = 120
target-version = ['py310']
include = '\.pyi?$'
extend-exclude = '''
^/migrations/
'''

[tool.isort]
profile = "black"  # 使用 black 兼容配置
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
line_length = 120
skip = ["migrations"]