# setup.cfg
[flake8]
max-line-length = 88
extend-ignore = E203, W503
exclude = 
    .git,
    __pycache__,
    */migrations/*,
    venv,
    env,
    .venv,
    .env,
    build,
    dist
per-file-ignores =
    config/test_settings.py:F403,F401
    api/tests/test_serializers.py:F401
    config/settings.py:E501
    __init__.py:F401

[pylint]
[MASTER]
ignore=migrations,tests,venv,env,.venv,.env
python-path=.

[FORMAT]
max-line-length=88
indent-width=4

[MESSAGES CONTROL]
disable=
    C0111,  # missing-docstring
    R0903,  # too-few-public-methods
    C0103,  # invalid-name
    W0511,  # fixme
    W0621,  # redefined-outer-name
    R0913,  # too-many-arguments
    R0914,  # too-many-locals
    W0718,  # broad-exception-caught
    E1101,  # no-member
    R0801,  # duplicate-code
    W0223,  # abstract-method
    E226,  # missing-module-docstring

[BASIC]
good-names=i,j,k,ex,Run,_,id,pk,db,fp

[SIMILARITIES]
min-similarity-lines=6

[pycodestyle]
max_line_length = 88
ignore = E226,E302,E41,W503,E203

[isort]
profile = black
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
line_length = 88

[pytest]
DJANGO_SETTINGS_MODULE = config.test_settings
python_files = tests.py test_*.py *_tests.py
addopts = -v
markers =
    integration: marks tests as integration tests
    unit: marks tests as unit tests
