#setup.cfg
[flake8]
max-line-length = 88
extend-ignore = E203,W503,F401,F403,E501
exclude = 
    .git,
    __pycache__,
    */migrations/*,
    venv,
    env,
    .venv,
    .env,
    build,
    dist,
    docs
per-file-ignores =
    config/test_settings.py:F403,F401
    api/tests/test_serializers.py:F401
    config/settings.py:E501
    __init__.py:F401

[pylint]
[MASTER]
ignore=
    migrations,
    tests,
    test,
    venv,
    env,
    .venv,
    .env,
    docs
python-path=.
load-plugins=
    pylint_django,
    pylint_celery

[FORMAT]
max-line-length=88
indent-width=4

[MESSAGES CONTROL]
disable=
    C0111,  # missing-docstring
    R0903,  # too-few-public-methods
    C0103,  # invalid-name
    W0511,  # fixme
    W0621,  # redefined-outer-name
    R0913,  # too-many-arguments
    R0914,  # too-many-locals
    W0718,  # broad-exception-caught
    E1101,  # no-member
    R0801,  # duplicate-code
    W0223,  # abstract-method
    C0114,  # missing-module-docstring
    W0401,  # import-outside-toplevel
    W0614,  # unused-wildcard-import
    E0401,  # import-error
    R0901   # too-many-ancestors

[BASIC]
good-names=
    i,
    j,
    k,
    ex,
    Run,
    _,
    id,
    pk,
    db,
    fp,
    T

[SIMILARITIES]
min-similarity-lines=6
ignore-comments=yes
ignore-docstrings=yes
ignore-imports=yes

[pycodestyle]
max_line_length = 88
ignore = E226,E302,E41,W503,E203

[isort]
profile = black
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
line_length = 88
skip = migrations,venv,env,.venv,.env
known_django = django
known_rest_framework = rest_framework
sections = FUTURE,STDLIB,DJANGO,REST_FRAMEWORK,THIRDPARTY,FIRSTPARTY,LOCALFOLDER

[tool:pytest]
DJANGO_SETTINGS_MODULE = config.test_settings
python_files = tests.py test_*.py *_tests.py
addopts = 
    -v
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --no-cov-on-fail
markers =
    integration: marks tests as integration tests
    unit: marks tests as unit tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

[coverage:run]
source = .
omit =
    */migrations/*
    */tests/*
    */venv/*
    manage.py
    config/*

[mypy]
plugins =
    mypy_django_plugin.main
strict_optional = True
ignore_missing_imports = True
check_untyped_defs = True
disallow_untyped_defs = True

[mypy.plugins.django-stubs.django.*]
init_typed = True